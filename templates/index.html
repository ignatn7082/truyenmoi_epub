<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truyện → EPUB</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e8e9ec;
    --muted: #8b93a1;
    --accent: #6c8cff;
    --accent-2: #9b6cff;
    --ok: #3ddc97;
    --err: #ff6b6b;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(108,140,255,0.15), transparent),
      radial-gradient(1000px 500px at 100% 0%, rgba(155,108,255,0.12), transparent),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px;
  }
  .wrap { width: 100%; max-width: 640px; }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo h1 {
    font-size: 1.6rem;
    margin: 0 0 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .logo p { margin: 0; color: var(--muted); font-size: 0.9rem; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }

  .input-row {
    display: flex;
    gap: 10px;
  }
  input[type="text"] {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 13px 14px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color .15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    border: none;
    border-radius: 10px;
    padding: 13px 20px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: white;
    transition: opacity .15s, transform .05s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.92; }
  button:active { transform: scale(0.98); }
  button:disabled {
    background: var(--panel-2);
    color: var(--muted);
    cursor: not-allowed;
  }

  .hint { margin-top: 10px; color: var(--muted); font-size: 0.8rem; }

  .status-block { margin-top: 24px; display: none; }
  .status-block.visible { display: block; }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .status-title {
    font-weight: 600;
    font-size: 0.95rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 70%;
  }
  .status-percent { color: var(--accent); font-weight: 700; font-size: 0.95rem; }

  .progress-track {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    height: 12px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width .3s ease;
    border-radius: 999px;
  }
  .progress-fill.indeterminate {
    width: 35% !important;
    animation: slide 1.2s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { margin-left: -35%; }
    50%  { margin-left: 65%; }
    100% { margin-left: -35%; }
  }

  .current-chapter {
    margin-top: 10px;
    font-size: 0.82rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .result {
    margin-top: 18px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(61, 220, 151, 0.08);
    border: 1px solid rgba(61, 220, 151, 0.3);
    border-radius: 10px;
  }
  .result.visible { display: flex; }
  .result .label { font-size: 0.9rem; color: var(--ok); font-weight: 600; }
  .result a {
    background: var(--ok);
    color: #06251a;
    text-decoration: none;
    font-weight: 700;
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 0.85rem;
  }

  .error-box {
    margin-top: 18px;
    display: none;
    padding: 14px 16px;
    background: rgba(255, 107, 107, 0.08);
    border: 1px solid rgba(255, 107, 107, 0.3);
    border-radius: 10px;
    color: var(--err);
    font-size: 0.88rem;
  }
  .error-box.visible { display: block; }

  footer {
    text-align: center;
    margin-top: 22px;
    color: var(--muted);
    font-size: 0.78rem;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>Truyện → EPUB</h1>
    <p>Dán link truyện, nhận file EPUB. Hỗ trợ metruyenchuvn.com và các site cùng theme.</p>
  </div>

  <div class="card">
    <form id="convert-form">
      <div class="input-row">
        <input type="text" id="url-input" placeholder="https://metruyenchuvn.com/ten-truyen" autocomplete="off" required>
        <button type="submit" id="submit-btn">Tạo EPUB</button>
      </div>
      <div class="hint">Ví dụ: metruyenchuvn.com/ta-mo-phong-truong-sinh-lo-dich</div>
    </form>

    <div class="status-block" id="status-block">
      <div class="status-row">
        <span class="status-title" id="status-title">Đang chuẩn bị…</span>
        <span class="status-percent" id="status-percent"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill indeterminate" id="progress-fill"></div>
      </div>
      <div class="current-chapter" id="current-chapter"></div>
    </div>

    <div class="result" id="result-block">
      <span class="label" id="result-label">Hoàn tất!</span>
      <a id="download-link" href="#">Tải EPUB</a>
    </div>

    <div class="error-box" id="error-block"></div>
  </div>

  <footer>Chỉ dùng cho mục đích cá nhân · Không spam request để tránh bị site chặn</footer>
</div>

<script>
const form = document.getElementById('convert-form');
const urlInput = document.getElementById('url-input');
const submitBtn = document.getElementById('submit-btn');

const statusBlock = document.getElementById('status-block');
const statusTitle = document.getElementById('status-title');
const statusPercent = document.getElementById('status-percent');
const progressFill = document.getElementById('progress-fill');
const currentChapter = document.getElementById('current-chapter');

const resultBlock = document.getElementById('result-block');
const downloadLink = document.getElementById('download-link');
const errorBlock = document.getElementById('error-block');

let pollTimer = null;

function resetUI() {
  statusBlock.classList.add('visible');
  resultBlock.classList.remove('visible');
  errorBlock.classList.remove('visible');
  statusTitle.textContent = 'Đang chuẩn bị…';
  statusPercent.textContent = '';
  currentChapter.textContent = '';
  progressFill.classList.add('indeterminate');
  progressFill.style.width = '0%';
}

function stopPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
}

async function poll(jobId) {
  try {
    const res = await fetch(`/status/${jobId}`);
    const data = await res.json();

    if (data.error && res.status === 404) {
      throw new Error('Không tìm thấy job.');
    }

    if (data.book_title) {
      statusTitle.textContent = data.book_title;
    }
    if (data.current_title) {
      currentChapter.textContent = `Đang tải: ${data.current_title}`;
    }

    if (data.percent !== null && data.percent !== undefined) {
      progressFill.classList.remove('indeterminate');
      progressFill.style.width = data.percent + '%';
      statusPercent.textContent = `${data.done}${data.total ? ' / ' + data.total : ''} chương (${data.percent}%)`;
    } else {
      statusPercent.textContent = `${data.done} chương`;
    }

    if (data.status === 'done') {
      stopPolling();
      progressFill.classList.remove('indeterminate');
      progressFill.style.width = '100%';
      resultBlock.classList.add('visible');
      downloadLink.href = `/download/${jobId}`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Tạo EPUB';
    } else if (data.status === 'error') {
      stopPolling();
      errorBlock.textContent = data.error || 'Có lỗi xảy ra.';
      errorBlock.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Tạo EPUB';
    }
  } catch (err) {
    stopPolling();
    errorBlock.textContent = 'Mất kết nối tới máy chủ: ' + err.message;
    errorBlock.classList.add('visible');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Tạo EPUB';
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const url = urlInput.value.trim();
  if (!url) return;

  resetUI();
  submitBtn.disabled = true;
  submitBtn.textContent = 'Đang xử lý…';

  try {
    const res = await fetch('/convert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Không thể bắt đầu tải.');
    }

    stopPolling();
    pollTimer = setInterval(() => poll(data.job_id), 1200);
    poll(data.job_id);
  } catch (err) {
    errorBlock.textContent = err.message;
    errorBlock.classList.add('visible');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Tạo EPUB';
  }
});
</script>
</body>
</html>
